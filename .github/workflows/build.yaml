name: Build

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "*"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml
      - name: Build website
        run: |
          cd website 
          pnpm install --frozen-lockfile
          pnpm build
      - name: Test
        run: go test ./...

  build-publish:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml
      - name: Build website
        run: |
          cd website 
          pnpm install --frozen-lockfile
          pnpm build
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: v2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
